<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Vault | Rolex</title>
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="../src/site-header.js"></script>
  </head>
  <body class="model-viewer-page">
    <div class="page-shell">
      <site-header data-base-path="../" data-current="models" data-compact="true"></site-header>

      <main class="animation-layout">
        <section class="animation-copy">
          <p class="eyebrow">Modello 01</p>
          <h1>Rolex</h1>
          <p>
            Viewer dedicato al modello GLB usato nella seconda animazione, con scena di default,
            luci morbide e controlli orbit.
          </p>
          <p class="file-pill">public/models/rolex.glb</p>
          <div class="panel-actions">
            <a class="card-link" href="/models/rolex.glb" target="_blank" rel="noreferrer">Scarica file</a>
            <a class="back-link" href="../modelli.html">Torna ai modelli</a>
          </div>
        </section>

        <section
          id="model-stage"
          class="animation-stage light-stage"
          data-model-url="/models/rolex.glb"
          aria-label="Viewer modello Rolex"
        ></section>
      </main>
    </div>

    <script type="module" src="../src/scenes/model-viewer.js"></script>
  </body>
</html>
